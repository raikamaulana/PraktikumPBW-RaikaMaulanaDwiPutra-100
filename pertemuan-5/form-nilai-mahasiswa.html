<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penilaian Mahasiswa - Pt.5</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Fasilkom.png" type="image/x-icon">
</head>
<body>
    <!-- Div untuk efek dekoratif lingkaran blur -->
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="glass-card">
        <h1>Input Nilai Mahasiswa</h1>
        <p class="subtitle">Informatika UNSIKA</p>

        <div class="input-group">
            <label>NIM Mahasiswa</label>
            <input type="text" id="nim" placeholder="Masukkan NIM...">
        </div>

        <div class="input-group">
            <label>Nilai Angka</label>
            <input type="number" id="nilai" placeholder="0 - 100">
        </div>

        <div class="button-group">
            <!-- menjalankan function cekNilai() ketika tombol diklik -->
            <button onclick="cekNilai()">Cek Huruf Mutu</button>

            <!-- menjalankan function resetForm() ketika tombol diklik -->
            <button onclick="resetForm()">Reset</button>
        </div>

        <div id="result-box">
            <div class="npm-title">NOMOR POKOK MAHASISWA</div>
            <div id="npm-output" class="npm-output">-</div>
            
            <span class="huruf-mutu-title">HURUF MUTU</span>
            <div id="grade-output" class="grade-text">-</div>
            <div id="info-teks" style="font-size: 13px;">Menunggu input...</div>
        </div>
    </div>

    <!-- Link js di bagian bawah untuk memastikan HTML sudah dimuat sebelum script dijalankan -->
    <script src="script.js"></script>
</body>
</html>
